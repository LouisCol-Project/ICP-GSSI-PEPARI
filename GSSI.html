<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSSI – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png">

<style>

/* ===== GLOBAL ===== */
:root{
  --primary:#d32f2f;
  --blue:#1976d2;
  --bg:#f4f6f9;
  --card:#ffffff;
  --shadow:0 10px 25px rgba(0,0,0,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  background: linear-gradient(135deg,#f4f6f9,#eef2f7);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:#222;
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:linear-gradient(135deg,var(--primary),#b71c1c);
  color:white;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

header img{
  height:45px;
  background:white;
  padding:4px;
  border-radius:8px;
}

header h1{
  font-size:1.2rem;
}

#date{
  font-size:0.85rem;
  opacity:0.9;
}

/* ===== CONTAINER ===== */
.container{
  width:95%;
  max-width:1000px;
  margin:25px auto;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ===== CONTROLS ===== */
.controls{
  background:var(--card);
  padding:16px;
  border-radius:14px;
  box-shadow:var(--shadow);
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  justify-content:center;
}

.controls label{
  font-weight:600;
  font-size:0.9rem;
}

.controls select,
.controls input{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #ddd;
  outline:none;
}

/* ===== BUTTONS ===== */
button{
  padding:9px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

.primary{
  background:var(--blue);
  color:white;
}

.primary:hover{
  background:#125aa0;
}

.danger{
  background:var(--primary);
  color:white;
}

/* ===== TABLE ===== */
#tableau-container{
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

thead th{
  background:linear-gradient(90deg,var(--blue),#1565c0);
  color:white;
  padding:12px;
  font-size:0.9rem;
}

tbody td{
  padding:8px;
  border-bottom:1px solid #eee;
  text-align:center;
}

tbody tr:hover{
  background:#f1f7ff;
}

input{
  width:90%;
  padding:6px;
  border:1px solid #ddd;
  border-radius:6px;
  text-align:center;
}

input:focus{
  border-color:var(--blue);
  box-shadow:0 0 5px rgba(25,118,210,0.3);
}

/* ===== ACTIONS ===== */
#send-button{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.back{
  background:#555;
  color:white;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  header h1{font-size:1rem;}
}

</style>
</head>

<body>

<header>
  <img src="images/logo.png">
  <h1>GSSI</h1>
  <div id="date"></div>
</header>

<script>
document.getElementById('date').textContent =
new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
</script>

<div class="container">

<div class="controls">
  <select id="EAP-select">
    <option value="">SOG</option>
    <option>ADC BERNARD</option>
	<option>ADC COHEN</option>
    <option>ADC CRETIN</option>
    <option>ADC DETAILLE</option>
    <option>ADC DOTT</option>
    <option>ADC FOUQUIER</option>
    <option>ADC GARNIER</option>
    <option>ADC GAUDET</option>
    <option>ADC POUSSIN</option>
    <option>ADC TRAVERT</option>
    <option>ADC VITTET</option>
  </select>

  <input type="number" id="nombre" placeholder="Nb agents">

  <button class="primary" onclick="genererTableau()">Générer</button>
</div>

<div id="tableau"></div>

<br>
<button class="primary" onclick="envoyer()">Envoyer ICP</button>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDO_a2albfrFLjl5m2jjEWfcuFsRFhzFek",
  authDomain: "icp-gssi-pepari.firebaseapp.com",
  projectId: "icp-gssi-pepari",
  storageBucket: "icp-gssi-pepari.firebasestorage.app",
  messagingSenderId: "744812768446",
  appId: "1:744812768446:web:737f2971af7b24987842ef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
</script>

<script>
document.getElementById('date').textContent =
new Date().toLocaleDateString('fr-FR');

const colonnes = [
"NOM",
"ARI + Ventilateurs",
"CUO Ventilation",
"Echelles",
"Sauvetage extérieur"
];

function genererTableau(){
  const nb = document.getElementById('nombre').value;
  if(!nb) return alert("Nombre invalide");

  let html = "<table><thead><tr>";
  colonnes.forEach(c=> html+=`<th>${c}</th>`);
  html+="<th>Progression</th></tr></thead><tbody>";

  for(let i=0;i<nb;i++){
    html+="<tr>";
html+=`<td><input type="text" oninput="this.value=this.value.toUpperCase()"></td>`;

    for(let j=1;j<colonnes.length;j++){
      html+=`<td><input type="checkbox" onchange="updateProgress(this)"></td>`;
    }

    html+=`
    <td>
      <div class="progress">
        <div class="progress-bar"></div>
      </div>
    </td>`;

    html+="</tr>";
  }

  html+="</tbody></table>";
  document.getElementById('tableau').innerHTML = html;
}

function updateProgress(el){
  const row = el.closest("tr");
  const checks = row.querySelectorAll('input[type="checkbox"]');
  const bar = row.querySelector('.progress-bar');

  let total = checks.length;
  let checked = 0;

  checks.forEach(c=>{ if(c.checked) checked++; });

  let percent = (checked/total)*100;
  bar.style.width = percent+"%";
}

async function envoyer(){
  const table = document.querySelector("table");
  if(!table) return alert("Génère le tableau");

  const rows = table.querySelectorAll("tbody tr");
  const eap = document.getElementById("EAP-select").value;

  let data = [];

  rows.forEach(r=>{
    const inputs = r.querySelectorAll("input");
    let agent = {};

    agent["NOM"] = inputs[0].value.toUpperCase();

    for(let i=1;i<colonnes.length;i++){
      agent[colonnes[i]] = inputs[i].checked;
    }

    data.push(agent);
  });

  try {
    await window.addDoc(window.collection(window.db,"GSSI"),{
      eap:eap,
      date:new Date().toISOString(),
      agents:data
    });


    // 🔥 REDIRECTION ICI
    window.location.href = "index.html";

  } catch (e) {
    console.error(e);
    alert("Erreur envoi ❌");
  }
}
</script>

</body>
</html>
