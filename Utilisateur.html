<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Utilisateurs – CIS Taverny</title>
<link rel="shortcut icon" href="images/logo.png">

<style>

/* ===== BASE ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:linear-gradient(135deg,#f4f6f9,#eef2f7);
  min-height:100vh;
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:linear-gradient(135deg,#d32f2f,#b71c1c);
  color:white;
}

header img{
  height:45px;
  background:white;
  padding:4px;
  border-radius:8px;
}

#date{
  font-size:0.85rem;
  opacity:0.9;
}

/* ===== LAYOUT ===== */
.container{
  width:95%;
  max-width:1000px;
  margin:20px auto;
  display:grid;
  gap:15px;
}

/* ===== STATS ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  text-align:center;
  font-weight:600;
}

.card span{
  display:block;
  font-size:1.3rem;
  margin-top:5px;
  color:#1976d2;
}

/* ===== PANEL ===== */
.panel{
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ===== FORM ===== */
form{
  display:grid;
  gap:10px;
}

input, select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

input:focus, select:focus{
  border-color:#1976d2;
  box-shadow:0 0 6px rgba(25,118,210,0.3);
}

/* ===== BUTTONS ===== */
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

button{
  flex:1;
  min-width:120px;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{ transform:translateY(-2px); }

.add{background:#1976d2;color:white;}
.update{background:#0288d1;color:white;}
.delete{background:#d32f2f;color:white;}
.back{background:#555;color:white;}

/* ===== SEARCH + FILTER ===== */
.tools{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.tools input, .tools select{
  flex:1;
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
  border-radius:12px;
  overflow:hidden;
}

thead th{
  background:#1976d2;
  color:white;
  padding:10px;
  font-size:0.9rem;
}

td{
  text-align:center;
  padding:10px;
  border-bottom:1px solid #eee;
}

tr:hover{
  background:#f1f7ff;
  cursor:pointer;
}

/* ===== BADGES ===== */
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:0.75rem;
  font-weight:600;
}

.homme{background:#e3f2fd;color:#1976d2;}
.femme{background:#fce4ec;color:#d81b60;}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#323232;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<header>
  <img src="images/logo.png">
  <h1>Gestion Utilisateurs</h1>
  <div id="date"></div>
</header>

<div class="container">

<!-- ===== STATS ===== -->
<div class="stats">
  <div class="card">Total<span id="total">0</span></div>
  <div class="card">Hommes<span id="hommes">0</span></div>
  <div class="card">Femmes<span id="femmes">0</span></div>
</div>

<!-- ===== FORM ===== -->
<div class="panel">

<form id="form">

  <input id="nom" placeholder="Nom (ex: ABATI)">
  <input type="date" id="dob">

  <select id="sexe">
    <option value="">Sexe</option>
    <option value="HOMME">Homme</option>
    <option value="FEMME">Femme</option>
  </select>

  <div class="buttons">
    <button class="add" type="submit">Ajouter</button>
    <button class="update" type="button" id="update">Modifier</button>
    <button class="delete" type="button" id="delete">Supprimer</button>
    <button class="back" type="button" onclick="location.href='index.html'">Retour</button>
  </div>

</form>

<!-- ===== TOOLS ===== -->
<div class="tools">
  <input id="search" placeholder="🔎 Rechercher...">
  <select id="filter">
    <option value="ALL">Tous</option>
    <option value="HOMME">Hommes</option>
    <option value="FEMME">Femmes</option>
  </select>
</div>

<!-- ===== TABLE ===== -->
<table>
<thead>
<tr>
  <th>Nom</th>
  <th>Date</th>
  <th>Sexe</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

import { 
initializeApp 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore, collection, getDocs, addDoc, doc, setDoc, deleteDoc, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDO_a2albfrFLjl5m2jjEWfcuFsRFhzFek",
  authDomain: "icp-gssi-pepari.firebaseapp.com",
  projectId: "icp-gssi-pepari"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db,"utilisateurs");

const tbody = document.getElementById("tbody");

const form = document.getElementById("form");
const nom = document.getElementById("nom");
const dob = document.getElementById("dob");
const sexe = document.getElementById("sexe");

const search = document.getElementById("search");
const filter = document.getElementById("filter");

const total = document.getElementById("total");
const hommes = document.getElementById("hommes");
const femmes = document.getElementById("femmes");

let users = [];
let selected = null;

/* ===== LOAD ===== */
async function load(){
  const snap = await getDocs(query(col, orderBy("nom")));

  users = [];

  snap.forEach(d=>{
    users.push({id:d.id, ...d.data()});
  });

  render();
  stats();
}

/* ===== RENDER ===== */
function render(){

  const s = search.value.toLowerCase();
  const f = filter.value;

  tbody.innerHTML = "";

  users
  .filter(u => u.nom.toLowerCase().includes(s))
  .filter(u => f === "ALL" ? true : u.sexe === f)
  .forEach(u => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.nom}</td>
      <td>${u.dateDeNaissance}</td>
      <td>${u.sexe}</td>
    `;

    tr.onclick = () => {
      selected = u;
      nom.value = u.nom;
      dob.value = u.dateDeNaissance;
      sexe.value = u.sexe;
    };

    tbody.appendChild(tr);
  });
}

/* ===== STATS ===== */
function stats(){
  total.textContent = users.length;
  hommes.textContent = users.filter(u=>u.sexe==="HOMME").length;
  femmes.textContent = users.filter(u=>u.sexe==="FEMME").length;
}

/* ===== ADD ===== */
form.onsubmit = async(e)=>{
  e.preventDefault();

  await addDoc(col,{
    nom: nom.value.toUpperCase(),
    dateDeNaissance: dob.value,
    sexe: sexe.value
  });

  form.reset();
  load();
};

/* ===== UPDATE ===== */
document.getElementById("update").onclick = async()=>{
  if(!selected) return alert("Sélectionne un utilisateur");

  await setDoc(doc(db,"utilisateurs",selected.id),{
    nom: nom.value.toUpperCase(),
    dateDeNaissance: dob.value,
    sexe: sexe.value
  });

  form.reset();
  load();
};

/* ===== DELETE ===== */
document.getElementById("delete").onclick = async()=>{
  if(!selected) return alert("Sélectionne un utilisateur");

  await deleteDoc(doc(db,"utilisateurs",selected.id));

  form.reset();
  load();
};

/* ===== EVENTS ===== */
search.oninput = render;
filter.onchange = render;

/* ===== INIT ===== */
load();

</script>

</body>
</html>
