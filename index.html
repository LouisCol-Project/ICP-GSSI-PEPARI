<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="shortcut icon" href="images/logo.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* ===== GLOBAL ===== */
:root{
  --primary:#d32f2f;
  --dark:#1f1f1f;
  --bg:#f4f6f9;
  --card:#ffffff;
  --shadow:0 10px 25px rgba(0,0,0,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  background: linear-gradient(135deg,#f4f6f9,#eef2f7);
  color:#222;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  background: linear-gradient(135deg,var(--primary),#b71c1c);
  color:white;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

header img{
  height:48px;
  border-radius:8px;
  background:white;
  padding:4px;
}

header h1{
  font-size:1.2rem;
  font-weight:600;
  letter-spacing:0.5px;
}

#date{
  font-size:0.85rem;
  opacity:0.9;
}

/* ===== MAIN ===== */
main{
  width:95%;
  max-width:900px;
  margin:auto;
  padding:25px 0;
  display:grid;
  gap:20px;
}

/* ===== DASHBOARD ===== */
.evaluation-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.evaluation{
  background:var(--card);
  padding:18px;
  border-radius:14px;
  box-shadow:var(--shadow);
  text-align:center;
  cursor:pointer;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

.evaluation i{
  font-size:1.8rem;
  margin-bottom:10px;
}

.evaluation:hover{
  transform:translateY(-5px);
  box-shadow:0 14px 30px rgba(0,0,0,0.12);
}

/* accents */
.ICP i{ color:#e53935; }
.GSSI i{ color:#fb8c00; }
.PEPARI i{ color:#43a047; }
.stat i{ color:#5c6bc0; }

.evaluation span{
  display:block;
  font-weight:600;
  margin-top:6px;
  letter-spacing:0.3px;
}

/* ===== INFO CARD ===== */
.info-app{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:var(--shadow);
}

.info-app h2{
  font-size:1rem;
  margin-bottom:10px;
  color:#333;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:0.9rem;
}

td,th{
  padding:10px;
  border-bottom:1px solid #eee;
}

th{
  text-align:left;
  color:#555;
}

/* ===== MODAL ===== */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding:22px;
  border-radius:16px;
  width:320px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.modal-content h2{
  margin-bottom:12px;
  color:var(--primary);
}

.modal-content input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

.modal-content button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.modal-content button:hover{
  background:#b71c1c;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:12px;
  background:var(--primary);
  color:white;
  font-size:0.85rem;
  margin-top:auto;
}

</style>
</head>

<body>

// 🔐 MODAL LOGIN
function ouvrirLogin(type){

  const modal = document.createElement('div');
  modal.className = 'modal-bg';

  modal.innerHTML = `
    <div class="modal-content">
      <h2>Connexion</h2>
      <input id="loginUser" placeholder="Nom d'utilisateur">
	  <div style="position:relative;">
  <input id="loginPass" type="password" placeholder="Mot de passe" style="width:100%; padding-right:40px;">
  <span id="togglePass" style="
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:1.1rem;
  ">👁️</span>
</div>
      <button id="loginBtn">Connexion</button>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById('loginBtn').onclick = () => {

    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;

    const cred = ACCESS[type];

    if(user === cred.user && pass === cred.pass){
      modal.remove();
      window.location.href = cred.page;
    } else {
      alert("Accès refusé");
    }
  };
  
  // 👁️ Afficher / masquer mot de passe
const toggle = document.getElementById('togglePass');
const input = document.getElementById('loginPass');

toggle.onclick = () => {
  if(input.type === "password"){
    input.type = "text";
    toggle.textContent = "🙈";
  } else {
    input.type = "password";
    toggle.textContent = "👁️";
  }
};

  // fermer en cliquant dehors
  modal.onclick = (e) => {
    if(e.target === modal) modal.remove();
  };
}
